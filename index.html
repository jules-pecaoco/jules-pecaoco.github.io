<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jules.</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="index.css" />

    <!-- JS -->
    <script src="app.js" defer></script>
  </head>
  <body>
    <!-- Hero -->
    <main class="hero-section">
      <!-- Header -->
      <div class="container-bordered bg-light">
        <div class="container-content text-black">
          <a href="" class="text-black">jules.delusional.wooooorld</a>
          <i class="fa-solid fa-sun font-subheader" id="dark-toggle"></i>
        </div>
      </div>
      <div class="container-bordered bg-light">
        <div class="container-content" id="pink-toggle">
          <h1 class="text-black font-body text-animation"><span></span></h1>
        </div>
      </div>

      <!-- Profile -->
      <div class="container-bordered bg-light">
        <img src="/images/profile.png" alt="" />
      </div>

      <!-- Navigations -->
      <div class="navigations">
        <div class="container-bordered container-hover bg-dark">
          <div class="container-content">
            <a href="#me" class="text-white"> me </a>
            <i class="fa-solid fa-user font-subheader text-white"></i>
          </div>
        </div>
        <div class="container-bordered container-hover bg-dark">
          <div class="container-content">
            <a href="#experience" class="text-white"> experience </a>
            <i class="fa-solid fa-medal font-subheader text-white"></i>
          </div>
        </div>
        <div class="container-bordered container-hover bg-dark">
          <div class="container-content">
            <a href="#projects" class="text-white"> projects </a>
            <i class="fa-solid fa-laptop-code font-subheader text-white"></i>
          </div>
        </div>
        <div class="container-bordered container-hover bg-dark">
          <div class="container-content">
            <a href="#tools" class="text-white"> tools </a>
            <i class="fa-solid fa-gears font-subheader text-white"></i>
          </div>
        </div>
      </div>
    </main>

    <!-- Me -->
    <div class="me-section" id="me"></div>

    <!-- Projects -->
    <div class="project-section" id="projects">
      <div class="text-black project-header">Projects</div>
      <div class="project-wrap">
        <div class="project-card container-bordered bg-light">
          <div class="project-img bg-dark">
            <img src="images/gym.png" alt="" />
          </div>
          <div class="project-content text-black">Bootstrap 3 Gym Site</div>
          <div class="project-hovered">
            <button class="btn-bordered text-white" onclick="location.href='https://github.com/jules-pecaoco/power-fitness';">github</button>
            <button class="btn-bordered text-white" onclick="location.href='https://jules-pecaoco.github.io/power-fitness/';">visit</button>
          </div>
        </div>
        <div class="project-card container-bordered bg-light">
          <div class="project-img bg-dark">
            <img src="images/crud.png" alt="" />
          </div>
          <div class="project-content text-black">Java CRUD App w/ mySQL</div>
          <div class="project-hovered">
            <button class="btn-bordered text-white" onclick="location.href='https://github.com/jules-pecaoco/Memorial-Plan-Project';">github</button>
          </div>
        </div>
        <div class="project-card container-bordered bg-light">
          <div class="project-img bg-dark">
            <img src="images/calculator.png" alt="" />
          </div>
          <div class="project-content text-black">PEMDAS Algorithm Calculator</div>
          <div class="project-hovered">
            <button class="btn-bordered text-white" onclick="location.href='https://github.com/jules-pecaoco/Calculator';">github</button>
          </div>
        </div>
      </div>

      <div class="collapse-content">
        <div class="project-wrap">
          <div class="project-card container-bordered bg-light">
            <div class="project-img bg-dark">
              <img src="images/snipets.png" alt="" />
            </div>
            <div class="project-content text-black">Fun Snippets</div>
            <div class="project-hovered">
              <button class="btn-bordered text-white" onclick="location.href='https://github.com/jules-pecaoco/snippets';">github</button>
              <button class="btn-bordered text-white" onclick="location.href='https://jules-pecaoco.github.io/snippets/';">visit</button>
            </div>
          </div>
        </div>
      </div>

      <div class="project-more">
        <i class="fa-solid fa-up-right-and-down-left-from-center" id="collapse-toggle"></i>
      </div>
    </div>

    <!-- Tools -->
    <div class="tools-sections" id="tools"></div>
  </body>
</html>
